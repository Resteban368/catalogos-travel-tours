proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tours_cache:10m max_size=200m inactive=7d use_temp_path=off;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    location /api/tours {
        proxy_pass https://api-travel.agenteviajes.com/v1/integracion/tours;
        proxy_ssl_server_name on;
        proxy_set_header Host api-travel.agenteviajes.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer ${API_KEY}";
        proxy_cache tours_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header Cache-Control "public, max-age=300";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /i/ {
        proxy_pass https://api-travel.agenteviajes.com/i/;
        proxy_ssl_server_name on;
        proxy_set_header Host api-travel.agenteviajes.com;
        proxy_set_header Authorization "Bearer ${API_KEY}";
        proxy_hide_header Cross-Origin-Resource-Policy;
        add_header Cross-Origin-Resource-Policy cross-origin;
        proxy_cache tours_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Cache-Status $upstream_cache_status;
    }
}
